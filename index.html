<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Fim Google Fonts -->
    <link rel="stylesheet" href="style.css">
    <title>Portifólio Murilo Pires</title>
</head>
<body>
    <header>
        <div class="interface">
            <div class="logo">
                <a href="#">
                    <img src="images/sigp_logo.png" alt="logo">
                </a>
            </div> <!-- Fim da logo -->

            <nav class="menu-desktop">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Especialidades</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Projetos</a></li>
                </ul>
            </nav>

            <div class="btn-contato">
                <a href="#">
                    <button>Contato</button>
                </a>
            </div>

        </div><!-- Fim do interface -->
    </header>
    <main>
        <section class="topo-do-site">
            <div class="interface">
                <div class="flex">
                    <div class="txt-topo-site">
                        <h1>Olá, me chamo <span>Murilo Pires</span>.</h1>
                        <p>Meu dominio é Backend, especializado em Python e ampliando meus conhecimentos rumo ao fullstack.</p>

                        <div class="botoes-topo">
                            <div class="btn-projetos">
                                <a href="#">
                                    <button>Ver Projetos</button>
                                </a>
                            </div>
                            <div class="btn-cv">
                                <a href="#">
                                    <button>Download CV</button>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="img-topo-site">
                        <img src="images/perfil.png" alt="perfil">
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
